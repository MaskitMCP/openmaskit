name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        # Skip the e2e suite — it lives in its own dependency group (pytest-playwright,
        # Chromium, Postgres URI) and is intended to run locally / on a manual workflow.
        # Without --ignore, pytest still tries to import tests/e2e/* during collection
        # and fails on the playwright import even though the e2e marker would deselect them.
        run: uv run pytest tests/ -v --ignore=tests/e2e
