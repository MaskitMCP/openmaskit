targets:
  slack:
    upstream:
      transport: http
      url: "https://mcp.slack.com/mcp"
      oauth:
        client_id: "1601185624273.8899143856786"
        callback_port: 3118
    rules: []

  postgres:
    upstream:
      transport: stdio
      command: podman
      args:
        - run
        - -i
        - --rm
        - -e
        - DATABASE_URI
        - crystaldba/postgres-mcp
        - --access-mode=unrestricted
      env:
        DATABASE_URI: "postgresql://amin:amin123@host.containers.internal:5432/postgres"
    rules: []

web_port: 9473
mcp_port: 9474
store_path: "~/.maskit/slack-store.db"
