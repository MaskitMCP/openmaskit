<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenMaskit - Marketplace</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/shared.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body>
<div x-data="marketplacePage()" x-init="init()">
    <header>
        <h1><a href="/" class="logo-link" aria-label="OpenMaskit home"><img src="/static/icon.png" alt="" class="header-icon">OpenMaskit</a></h1>
        <nav>
            <a href="/">Servers</a>
            <a href="/marketplace" class="active">Marketplace</a>
        </nav>
    </header>

    <main>
        <section class="panel">
            <h2>Marketplace</h2>
            <p class="section-hint">Browse and install MCP servers. Installed servers appear on the Servers page automatically.</p>

            <div class="marketplace-search">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                </svg>
                <input type="text"
                       class="search-input"
                       placeholder="Search servers by name, description, or tag..."
                       x-model="search"
                       @input="onSearchInput()">
            </div>

            <div x-show="loading" class="loading-overlay">
                <span class="spinner"></span> Loading marketplace...
            </div>

            <div class="tools-grid" x-show="!loading && servers.length > 0">
                <template x-for="server in servers" :key="server.id">
                    <div class="marketplace-card" :class="{ 'marketplace-card-active': server.active && server.connected }"
                         @click="if (server.active && server.connected) window.location.href = '/targets/' + encodeURIComponent(server.id) + '/tools'"
                         :style="(server.active && server.connected) ? 'cursor: pointer' : ''">
                        <div class="marketplace-card-header">
                            <img x-show="server.icon_url" :src="server.icon_url" :alt="server.name + ' icon'" width="36" height="36" class="marketplace-card-icon">
                            <div class="marketplace-card-badges">
                                <span x-show="server.official" class="badge-official" title="Official MCP Server">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                    Official
                                </span>
                                <template x-if="installType(server)">
                                    <span class="badge-install-type"
                                          :class="'badge-install-type-' + installType(server).slug"
                                          :title="installType(server).title"
                                          x-text="installType(server).label"></span>
                                </template>
                            </div>
                        </div>

                        <h3 x-text="server.name"></h3>
                        <p class="marketplace-card-desc" x-text="server.description"></p>

                        <div class="marketplace-card-tags">
                            <template x-for="tag in server.tags.slice(0, 3)" :key="tag">
                                <span class="marketplace-tag" x-text="tag"></span>
                            </template>
                        </div>

                        <div class="marketplace-card-footer">
                            <span x-show="server.active && server.connected" class="marketplace-status marketplace-status-connected">
                                <span class="status-dot"></span> Connected
                            </span>
                            <span x-show="server.installed && !server.active" class="marketplace-status marketplace-status-inactive">
                                Inactive
                            </span>

                            <button x-show="!server.installed"
                                    class="btn-primary btn-install"
                                    :disabled="server.installing || updateRequired"
                                    :title="updateRequired ? 'Update OpenMaskit to install' : ''"
                                    :aria-label="'Install ' + server.name"
                                    @click.stop="installServer(server)">
                                <span x-show="!server.installing">Install</span>
                                <span x-show="server.installing" class="spinner spinner-sm"></span>
                            </button>

                            <button x-show="server.installed && server.active"
                                    class="btn-danger"
                                    :disabled="server.deactivating"
                                    :aria-label="'Deactivate ' + server.name"
                                    @click.stop="deactivateServer(server)">
                                <span x-show="!server.deactivating">Deactivate</span>
                                <span x-show="server.deactivating" class="btn-loading">
                                    <span class="spinner spinner-sm"></span>
                                    Deactivating...
                                </span>
                            </button>

                            <button x-show="server.installed && !server.active"
                                    class="btn-activate"
                                    :disabled="server.installing"
                                    :aria-label="'Activate ' + server.name"
                                    @click.stop="activateServer(server)">
                                <span x-show="!server.installing">Activate</span>
                                <span x-show="server.installing" class="spinner spinner-sm"></span>
                            </button>
                        </div>
                    </div>
                </template>
            </div>

            <p x-show="!loading && servers.length === 0 && search" class="muted">
                No servers match your search.
            </p>
            <p x-show="!loading && servers.length === 0 && !search" class="muted">
                No servers available.
            </p>

            <!-- Pagination Controls -->
            <div x-show="!loading && totalPages > 1" class="pagination">
                <button @click="prevPage()"
                        :disabled="currentPage === 1"
                        class="pagination-btn"
                        aria-label="Previous page">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                    Previous
                </button>

                <div class="pagination-info">
                    <span class="pagination-current" x-text="`Page ${currentPage} of ${totalPages}`"></span>
                    <span class="pagination-total muted" x-text="`${totalServers} total servers`"></span>
                </div>

                <button @click="nextPage()"
                        :disabled="currentPage === totalPages"
                        class="pagination-btn"
                        aria-label="Next page">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
            </div>
        </section>
    </main>

    <!-- Config Modal (inline within same x-data scope) -->
    <div x-show="modal.visible" class="modal-backdrop" @keydown.escape.window="modalCancel()" style="display: none;">
        <div class="modal" @click.outside="modalCancel()">
            <h3 x-text="modalTitle()">Configuration Required</h3>

            <!-- URL params: server-specific identifiers that go in the upstream URL
                 (e.g. Supabase project_ref). Rendered before credentials so a DCR
                 entry's discovery can run against the resolved URL. -->
            <template x-if="modal.urlParams.length > 0">
                <div>
                    <p class="modal-desc">Server identifiers:</p>
                    <template x-for="p in modal.urlParams" :key="'urlparam_' + p.name">
                        <label class="modal-field">
                            <span class="modal-var-name">
                                <span x-text="p.label || p.name"></span>
                                <span x-show="!p.required" class="modal-var-optional">(optional)</span>
                            </span>
                            <input type="text" class="modal-input"
                                   :placeholder="p.placeholder || p.description || ('Enter ' + p.name)"
                                   x-model="modal.urlParamValues[p.name]"
                                   @input.debounce.500ms="onUrlParamInput()"
                                   :required="p.required"
                                   autocomplete="off">
                            <p x-show="p.description" class="modal-hint" x-text="p.description"></p>
                        </label>
                    </template>
                </div>
            </template>

            <!-- BYO: bring-your-own OAuth client credentials -->
            <template x-if="modal.oauthMode === 'byo'">
                <div>
                    <div class="modal-byo-banner" role="status">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <span><strong>Local only.</strong> Your credentials are stored on this machine and never sent to OpenMaskit servers.</span>
                    </div>

                    <p class="modal-desc">
                        Register an OAuth app on the provider's developer portal, paste the credentials below, and grant the scopes you want this server to use.
                        <template x-if="modal.setupGuideUrl">
                            <a :href="modal.setupGuideUrl" target="_blank" rel="noopener" class="modal-guide-link">
                                Setup guide
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17 17 7M7 7h10v10"/></svg>
                            </a>
                        </template>
                    </p>

                    <div class="modal-field">
                        <span class="modal-label">Authorized redirect URI</span>
                        <p class="modal-hint">Paste this into your OAuth app's authorized redirect URIs list before completing setup.</p>
                        <div class="modal-copy-row">
                            <code class="modal-copy-value" x-text="modal.redirectUri"></code>
                            <button type="button" class="modal-copy-btn"
                                    :class="{ copied: modal.byo.redirectCopied }"
                                    @click="copyRedirectUri()"
                                    x-text="modal.byo.redirectCopied ? 'Copied' : 'Copy'"></button>
                        </div>
                    </div>

                    <label class="modal-field">
                        <span class="modal-label">Client ID</span>
                        <input type="text" class="modal-input" placeholder="OAuth client_id"
                               x-model="modal.byo.clientId" autocomplete="off" required>
                    </label>
                    <label class="modal-field">
                        <span class="modal-label">Client Secret</span>
                        <input type="password" class="modal-input" placeholder="OAuth client_secret"
                               x-model="modal.byo.clientSecret" autocomplete="off" required>
                    </label>

                    <template x-if="modal.byoScopesLoading">
                        <div class="modal-field">
                            <span class="modal-label">Scopes</span>
                            <div class="modal-dcr-loading">
                                <span class="spinner spinner-sm"></span>
                                <span>Discovering scopes from the server…</span>
                            </div>
                        </div>
                    </template>

                    <template x-if="!modal.byoScopesLoading && modal.availableScopes.length > 0">
                        <div class="modal-field">
                            <span class="modal-label">Scopes</span>
                            <p class="modal-hint">The provider will show these on its consent screen. Required scopes can't be unchecked.</p>
                            <div class="modal-scope-list">
                                <template x-for="s in modal.availableScopes" :key="s.scope">
                                    <label class="modal-scope-item" :class="{ disabled: s.required }">
                                        <input type="checkbox"
                                               :value="s.scope"
                                               x-model="modal.selectedScopes"
                                               :disabled="s.required">
                                        <span class="modal-scope-text">
                                            <span class="modal-scope-label" x-text="s.label || s.scope"></span>
                                            <code class="modal-scope-raw" x-text="s.scope"></code>
                                        </span>
                                        <span x-show="s.required" class="modal-scope-required">required</span>
                                    </label>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- DCR: dynamic client registration -->
            <template x-if="modal.oauthMode === 'dcr'">
                <div>
                    <p class="modal-desc">
                        OpenMaskit will register an OAuth client with this server automatically and run the authorization flow in your browser.
                        <template x-if="modal.setupGuideUrl">
                            <a :href="modal.setupGuideUrl" target="_blank" rel="noopener" class="modal-guide-link">
                                Setup guide
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17 17 7M7 7h10v10"/></svg>
                            </a>
                        </template>
                    </p>

                    <div class="modal-field">
                        <span class="modal-label">Server URL</span>
                        <code class="modal-readonly-value" x-text="resolvedMcpHost()"></code>
                    </div>

                    <div class="modal-field">
                        <span class="modal-label">OAuth endpoints</span>
                        <div class="modal-dcr-status">
                            <template x-if="modal.dcr.discovering">
                                <div class="modal-dcr-loading">
                                    <span class="spinner spinner-sm"></span>
                                    <span>Discovering OAuth endpoints…</span>
                                </div>
                            </template>
                            <template x-if="modal.dcr.discoveryResult && !modal.dcr.discovering">
                                <div class="modal-dcr-success">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                    <span>Discovery complete · <code x-text="modal.dcr.discoveryResult.issuer"></code></span>
                                    <span x-show="!modal.dcr.discoveryResult.registration_endpoint" class="modal-dcr-warning">DCR not advertised — registration may still work</span>
                                </div>
                            </template>
                            <template x-if="modal.dcr.discoveryError">
                                <div class="modal-dcr-error">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                        <circle cx="12" cy="12" r="10"></circle>
                                        <line x1="15" y1="9" x2="9" y2="15"></line>
                                        <line x1="9" y1="9" x2="15" y2="15"></line>
                                    </svg>
                                    <span x-text="modal.dcr.discoveryError"></span>
                                </div>
                            </template>
                        </div>
                    </div>

                    <template x-if="dcrAllScopes().length > 0">
                        <div class="modal-field">
                            <span class="modal-label">Scopes</span>
                            <p class="modal-hint">Discovered from the server. Required scopes can't be unchecked.</p>
                            <label class="modal-scope-select-all-row">
                                <input type="checkbox"
                                       :checked="dcrAllNonRequiredSelected()"
                                       @change="dcrToggleAllScopes($event.target.checked)">
                                <span class="modal-scope-select-all-label">Select all</span>
                            </label>
                            <div class="modal-scope-list modal-scope-list-grid">
                                <template x-for="s in dcrAllScopes()" :key="s.scope">
                                    <label class="modal-scope-item" :class="{ disabled: s.required }">
                                        <input type="checkbox"
                                               :value="s.scope"
                                               x-model="modal.selectedScopes"
                                               :disabled="s.required">
                                        <span class="modal-scope-text">
                                            <code class="modal-scope-raw" x-text="s.scope"></code>
                                        </span>
                                        <span x-show="s.required" class="modal-scope-required">required</span>
                                    </label>
                                </template>
                            </div>
                        </div>
                    </template>

                    <div class="modal-field" x-data="{ showToken: false }">
                        <button type="button" class="modal-advanced-toggle" @click="showToken = !showToken">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                                 :style="showToken ? 'transform: rotate(90deg)' : ''">
                                <polyline points="9 18 15 12 9 6"></polyline>
                            </svg>
                            <span>Advanced: registration token (Okta, Auth0)</span>
                        </button>
                        <div x-show="showToken" x-transition.opacity style="margin-top: 0.5rem;">
                            <input type="password" class="modal-input" placeholder="Registration access token (optional)"
                                   x-model="modal.dcr.registrationToken" autocomplete="off">
                        </div>
                    </div>
                </div>
            </template>

            <template x-if="modal.oauthVars.length > 0">
                <div>
                    <p class="modal-desc">OAuth credentials (register an app on the provider's developer portal):</p>
                    <template x-for="varName in modal.oauthVars" :key="'oauth_' + varName">
                        <label class="modal-field">
                            <span x-text="varName" class="modal-var-name"></span>
                            <input :type="varName.includes('secret') ? 'password' : 'text'"
                                   :placeholder="'Enter ' + varName"
                                   x-model="modal.oauthValues[varName]" required>
                        </label>
                    </template>
                </div>
            </template>
            <template x-if="modal.envVars.length > 0">
                <div>
                    <template x-if="modal.envVars.some(v => v.type === 'secret')">
                        <div class="modal-byo-banner" role="status">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            <span><strong>Local only.</strong> Your credentials are stored on this machine and never sent to OpenMaskit servers.</span>
                        </div>
                    </template>
                    <p class="modal-desc">
                        Environment variables:
                        <template x-if="modal.setupGuideUrl">
                            <a :href="modal.setupGuideUrl" target="_blank" rel="noopener" class="modal-guide-link">
                                Setup guide
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17 17 7M7 7h10v10"/></svg>
                            </a>
                        </template>
                    </p>
                    <template x-for="varObj in modal.envVars" :key="'env_' + varObj.name">
                        <label class="modal-field" x-data="{ show: false }">
                            <span class="modal-var-name">
                                <span x-text="varObj.label || varObj.name"></span>
                                <span x-show="!varObj.required" class="modal-var-optional">(optional)</span>
                            </span>
                            <div class="modal-input-wrap">
                                <input class="modal-input"
                                       :type="varObj.type === 'secret' && !show ? 'password' : (varObj.type === 'number' ? 'number' : 'text')"
                                       :placeholder="varObj.description || ('Enter ' + varObj.name)"
                                       x-model="modal.envValues[varObj.name]"
                                       :required="varObj.required"
                                       :class="varObj.type === 'secret' ? 'modal-input-with-eye' : ''"
                                       autocomplete="off">
                                <template x-if="varObj.type === 'secret'">
                                    <button type="button" class="modal-eye-btn"
                                            @click.prevent.stop="show = !show"
                                            :aria-label="show ? 'Hide value' : 'Show value'"
                                            :aria-pressed="show">
                                        <svg x-show="!show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                        <svg x-show="show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                            <line x1="1" y1="1" x2="23" y2="23"/>
                                        </svg>
                                    </button>
                                </template>
                            </div>
                        </label>
                    </template>
                </div>
            </template>
            <template x-if="modal.headerVars.length > 0">
                <div>
                    <template x-if="modal.headerVars.some(v => v.type === 'secret') && modal.envVars.length === 0">
                        <div class="modal-byo-banner" role="status">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                            </svg>
                            <span><strong>Local only.</strong> Your credentials are stored on this machine and never sent to OpenMaskit servers.</span>
                        </div>
                    </template>
                    <p class="modal-desc">
                        HTTP headers:
                        <template x-if="modal.setupGuideUrl && modal.envVars.length === 0">
                            <a :href="modal.setupGuideUrl" target="_blank" rel="noopener" class="modal-guide-link">
                                Setup guide
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 17 17 7M7 7h10v10"/></svg>
                            </a>
                        </template>
                    </p>
                    <template x-for="varObj in modal.headerVars" :key="'header_' + varObj.name">
                        <label class="modal-field" x-data="{ show: false }">
                            <span class="modal-var-name">
                                <span x-text="varObj.label || varObj.name"></span>
                                <span x-show="!varObj.required" class="modal-var-optional">(optional)</span>
                            </span>
                            <div class="modal-input-wrap">
                                <input class="modal-input"
                                       :type="varObj.type === 'secret' && !show ? 'password' : (varObj.type === 'number' ? 'number' : 'text')"
                                       :placeholder="varObj.description || ('Enter ' + varObj.name)"
                                       x-model="modal.headerValues[varObj.name]"
                                       :required="varObj.required"
                                       :class="varObj.type === 'secret' ? 'modal-input-with-eye' : ''"
                                       autocomplete="off">
                                <template x-if="varObj.type === 'secret'">
                                    <button type="button" class="modal-eye-btn"
                                            @click.prevent.stop="show = !show"
                                            :aria-label="show ? 'Hide value' : 'Show value'"
                                            :aria-pressed="show">
                                        <svg x-show="!show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                            <circle cx="12" cy="12" r="3"/>
                                        </svg>
                                        <svg x-show="show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                            <line x1="1" y1="1" x2="23" y2="23"/>
                                        </svg>
                                    </button>
                                </template>
                            </div>
                        </label>
                    </template>
                </div>
            </template>
            <template x-if="modal.configurableArgs.length > 0">
                <div class="config-args-section">
                    <div class="config-section-header">
                        <span class="config-section-label">Runtime Configuration</span>
                        <span class="config-section-badge" x-text="`${modal.configurableArgs.length} param${modal.configurableArgs.length !== 1 ? 's' : ''}`"></span>
                    </div>

                    <template x-for="arg in modal.configurableArgs" :key="arg.name">
                        <div class="config-arg-block">
                            <div class="config-arg-header">
                                <span class="config-arg-label" x-text="arg.label"></span>
                                <span x-show="arg.required" class="config-required-star">*</span>
                            </div>
                            <p x-show="arg.description" class="config-arg-hint" x-text="arg.description"></p>

                            <!-- Multiple values -->
                            <template x-if="arg.multiple">
                                <div class="config-value-stack">
                                    <template x-for="(value, idx) in modal.userArgs[arg.name]" :key="idx">
                                        <div class="config-value-row">
                                            <span class="config-value-index" x-text="`${idx + 1}.`"></span>
                                            <input type="text"
                                                   x-model="modal.userArgs[arg.name][idx]"
                                                   :placeholder="arg.placeholder"
                                                   class="config-value-input">
                                            <button type="button"
                                                    class="config-remove-btn"
                                                    @click="removeArgValue(arg.name, idx)"
                                                    :disabled="modal.userArgs[arg.name].length === 1"
                                                    :aria-label="`Remove value ${idx + 1}`">
                                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                                </svg>
                                            </button>
                                        </div>
                                    </template>
                                    <button type="button"
                                            class="config-add-btn"
                                            @click="addArgValue(arg.name)">
                                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <line x1="12" y1="5" x2="12" y2="19"></line>
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                        </svg>
                                        <span>Add another</span>
                                    </button>
                                </div>
                            </template>

                            <!-- Single value -->
                            <template x-if="!arg.multiple">
                                <input type="text"
                                       x-model="modal.userArgs[arg.name]"
                                       :placeholder="arg.placeholder"
                                       class="config-value-input config-value-input-single">
                            </template>
                        </div>
                    </template>
                </div>
            </template>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" @click="modalCancel()">Cancel</button>
                <button type="button" class="btn-primary" @click="modalSubmit()">Install</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast-container">
        <template x-for="t in toasts" :key="t.id">
            <div class="toast" :class="'toast-' + t.type" x-text="t.msg"
                 x-init="setTimeout(() => toasts = toasts.filter(x => x.id !== t.id), 3000)"></div>
        </template>
    </div>
</div>

<script>
function marketplacePage() {
    let _modalResolve = null;
    let _searchDebounceTimer = null;

    return {
        servers: [],
        search: '',
        loading: true,
        toasts: [],
        updateRequired: false,

        installType(server) {
            const mode = server.oauth_mode;
            if (mode === 'byo') return { label: 'BYO', slug: 'byo', title: 'Bring-your-own OAuth: paste your own client_id and secret' };
            if (mode === 'dcr') return { label: 'DCR', slug: 'dcr', title: 'Dynamic Client Registration: OpenMaskit registers an OAuth client automatically' };
            if (!mode && server.requires_oauth) return { label: 'BROKER', slug: 'broker', title: 'Hosted OAuth broker (currently disabled)' };
            if (server.header_vars && server.header_vars.length > 0) return { label: 'API KEY', slug: 'header', title: 'Static HTTP headers (e.g. API-key auth)' };
            if (server.env_vars && server.env_vars.length > 0) return { label: 'ENV', slug: 'env', title: 'Needs environment variables (e.g. a token or API key)' };
            return null;
        },

        // Pagination state
        currentPage: 1,
        pageSize: 12,
        totalPages: 0,
        totalServers: 0,

        modal: {
            visible: false,
            server: null,
            // Legacy / generic config-required modes:
            envVars: [],
            headerVars: [],
            oauthVars: [],
            configurableArgs: [],
            urlParams: [],              // [{name, label, required, placeholder, description}]
            urlParamValues: {},         // {name: value}
            envValues: {},
            headerValues: {},
            oauthValues: {},
            userArgs: {},
            // OAuth setup variants:
            oauthMode: null,           // null | 'byo' | 'dcr'
            availableScopes: [],        // [{scope, label, required, default}]
            selectedScopes: [],         // selected scope strings
            setupGuideUrl: null,
            redirectUri: 'http://localhost:3131/callback',
            mcpHost: null,
            // BYO state
            byo: { clientId: '', clientSecret: '', redirectCopied: false },
            // DCR state
            dcr: {
                registrationToken: '',
                discovering: false,
                discoveryResult: null,
                discoveryError: null,
                discoveredScopes: [], // [{scope: str, required: bool}, ...]
            },
        },

        showToast(msg, type = 'success') {
            this.toasts.push({ id: Date.now(), msg, type });
        },

        openModal(server, envVars, oauthVars, headerVars) {
            this.modal.server = server;
            this.modal.envVars = envVars || [];
            this.modal.headerVars = headerVars || [];
            this.modal.oauthVars = oauthVars || [];
            this.modal.configurableArgs = server?.meta?.configurable_args || [];
            this.modal.urlParams = server?.meta?.params || [];
            this.modal.urlParamValues = {};
            this.modal.urlParams.forEach(p => { this.modal.urlParamValues[p.name] = ''; });
            this.modal.envValues = {};
            this.modal.headerValues = {};
            this.modal.oauthValues = {};
            this.modal.userArgs = {};
            this.modal.envVars.forEach(v => {
                const name = typeof v === 'string' ? v : v.name;
                this.modal.envValues[name] = '';
            });
            this.modal.headerVars.forEach(v => {
                const name = typeof v === 'string' ? v : v.name;
                this.modal.headerValues[name] = '';
            });
            this.modal.oauthVars.forEach(v => this.modal.oauthValues[v] = '');

            // Reset OAuth-setup branches by default; install flow flips these on as needed.
            this.modal.oauthMode = null;
            this.modal.availableScopes = [];
            this.modal.selectedScopes = [];
            // True while BYO is fetching scopes from /api/oauth/discover because
            // the catalog entry omitted `available_scopes`.
            this.modal.byoScopesLoading = false;
            this.modal.setupGuideUrl = server?.meta?.setup_guide_url || null;
            this.modal.mcpHost = server?.mcp_host || null;
            this.modal.byo = { clientId: '', clientSecret: '', redirectCopied: false };
            this.modal.dcr = {
                registrationToken: '',
                discovering: false,
                discoveryResult: null,
                discoveryError: null,
                discoveredScopes: [],
            };

            // Initialize userArgs with empty arrays for multiple args
            for (const arg of this.modal.configurableArgs) {
                if (arg.multiple) {
                    this.modal.userArgs[arg.name] = [''];
                } else {
                    this.modal.userArgs[arg.name] = '';
                }
            }

            this.modal.visible = true;
            return new Promise((resolve) => { _modalResolve = resolve; });
        },

        openByoModal(server) {
            const promise = this.openModal(server, [], []);
            this.modal.oauthMode = 'byo';

            const meta = server?.meta || {};
            if ('available_scopes' in meta) {
                // Catalog explicitly shipped scopes (possibly an empty array,
                // which means "no scopes to pick" — respect that).
                const available = (meta.available_scopes || []).map(s => ({
                    scope: s.scope,
                    label: s.label || s.scope,
                    required: !!s.required,
                    default: s.default !== false,
                }));
                this.modal.availableScopes = available;
                this.modal.selectedScopes = available
                    .filter(s => s.required || s.default)
                    .map(s => s.scope);
            } else {
                // Catalog omitted `available_scopes`. Try live discovery in
                // the background — the picker populates reactively when
                // scopes arrive. If discovery returns nothing, the picker
                // stays hidden and OAuth proceeds without a `scope=` param.
                this.modal.availableScopes = [];
                this.modal.selectedScopes = [];
                this.runByoScopeDiscovery(server?.mcp_host);
            }
            return promise;
        },

        async runByoScopeDiscovery(mcpUrl) {
            this.modal.byoScopesLoading = true;
            try {
                const discovered = await this.fetchDiscoveredScopes(mcpUrl);
                const available = discovered.map(s => ({
                    scope: s.scope,
                    label: s.scope,           // PRM doesn't carry labels
                    required: !!s.required,
                    default: false,           // no default-on signal from discovery
                }));
                this.modal.availableScopes = available;
                this.modal.selectedScopes = available
                    .filter(s => s.required)
                    .map(s => s.scope);
            } finally {
                this.modal.byoScopesLoading = false;
            }
        },

        async fetchDiscoveredScopes(mcpUrl) {
            if (!mcpUrl) return [];
            try {
                const res = await fetch('/api/oauth/discover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: mcpUrl }),
                });
                if (!res.ok) return [];
                const data = await res.json();
                return data.scopes || [];
            } catch (e) {
                return [];
            }
        },

        openDcrModal(server) {
            const promise = this.openModal(server, [], []);
            this.modal.oauthMode = 'dcr';
            this.modal.selectedScopes = [];
            // For templated entries we must wait for the user to fill the
            // required params before discovery — the resolved URL (with
            // query string) is what the upstream MCP server expects to be
            // probed at.
            if (this.allRequiredUrlParamsFilled()) {
                this.runDcrDiscovery();
            }
            return promise;
        },

        allRequiredUrlParamsFilled() {
            return this.modal.urlParams.every(p =>
                !p.required || (this.modal.urlParamValues[p.name] || '').trim() !== ''
            );
        },

        resolvedMcpHost() {
            const filled = {};
            for (const p of this.modal.urlParams) {
                const v = (this.modal.urlParamValues[p.name] || '').trim();
                if (v) filled[p.name] = v;
            }
            const keys = Object.keys(filled);
            if (keys.length === 0) return this.modal.mcpHost;
            const qs = keys
                .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(filled[k]))
                .join('&');
            return this.modal.mcpHost + '?' + qs;
        },

        onUrlParamInput() {
            // Re-run DCR discovery once all required params are filled.
            // Debounced via @input.debounce in the template.
            if (this.modal.oauthMode === 'dcr' && this.allRequiredUrlParamsFilled()) {
                this.runDcrDiscovery();
            }
        },

        modalTitle() {
            if (this.modal.oauthMode === 'byo') return `Connect ${this.modal.server?.name || 'server'}`;
            if (this.modal.oauthMode === 'dcr') return `Connect ${this.modal.server?.name || 'server'}`;
            return 'Configuration Required';
        },

        async copyRedirectUri() {
            try {
                await navigator.clipboard.writeText(this.modal.redirectUri);
                this.modal.byo.redirectCopied = true;
                setTimeout(() => { this.modal.byo.redirectCopied = false; }, 1500);
            } catch (e) {
                this.showToast('Copy failed — select and copy manually', 'error');
            }
        },

        async runDcrDiscovery() {
            if (!this.modal.mcpHost) {
                this.modal.dcr.discoveryError = 'Catalog entry missing server URL';
                return;
            }
            this.modal.dcr.discovering = true;
            this.modal.dcr.discoveryError = null;
            try {
                const res = await fetch('/api/oauth/discover', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: this.resolvedMcpHost() }),
                });
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || err.error || 'Discovery failed');
                }
                const data = await res.json();
                this.modal.dcr.discoveryResult = data;
                this.modal.dcr.discoveredScopes = data.scopes || [];
                // Keep prior selections that are still valid; ALWAYS keep required.
                const allTokens = this.modal.dcr.discoveredScopes.map(s => s.scope);
                const requiredTokens = this.modal.dcr.discoveredScopes
                    .filter(s => s.required).map(s => s.scope);
                const kept = this.modal.selectedScopes.filter(s => allTokens.includes(s));
                this.modal.selectedScopes = Array.from(new Set([...kept, ...requiredTokens]));
            } catch (e) {
                this.modal.dcr.discoveryError = e.message || 'Discovery failed';
                this.modal.dcr.discoveryResult = null;
                this.modal.dcr.discoveredScopes = [];
            } finally {
                this.modal.dcr.discovering = false;
            }
        },

        // ----- Scope picker helpers (shared by DCR section template) -----

        dcrAllScopes() {
            return this.modal.dcr.discoveredScopes || [];
        },

        dcrAllNonRequiredSelected() {
            const nonRequired = this.dcrAllScopes().filter(s => !s.required);
            if (nonRequired.length === 0) return true;
            return nonRequired.every(s => this.modal.selectedScopes.includes(s.scope));
        },

        dcrToggleAllScopes(checked) {
            const all = this.dcrAllScopes();
            const required = all.filter(s => s.required).map(s => s.scope);
            if (checked) {
                this.modal.selectedScopes = all.map(s => s.scope);
            } else {
                // Uncheck non-required; required stay locked-on.
                this.modal.selectedScopes = required;
            }
        },

        modalSubmit() {
            // URL params validation (applies to all install modes that use mcp_host)
            for (const p of this.modal.urlParams) {
                if (p.required && !(this.modal.urlParamValues[p.name] || '').trim()) {
                    this.showToast(`${p.label || p.name} is required`, 'error');
                    return;
                }
            }

            // BYO-specific validation
            if (this.modal.oauthMode === 'byo') {
                if (!this.modal.byo.clientId.trim() || !this.modal.byo.clientSecret.trim()) {
                    this.showToast('Client ID and Client Secret are required', 'error');
                    return;
                }
            }
            // DCR-specific validation
            if (this.modal.oauthMode === 'dcr') {
                if (this.modal.dcr.discovering) {
                    this.showToast('Wait for OAuth discovery to finish', 'error');
                    return;
                }
                if (!this.modal.dcr.discoveryResult) {
                    this.showToast('OAuth discovery failed — cannot continue', 'error');
                    return;
                }
            }

            // Clean up empty values from userArgs
            const cleanedUserArgs = {};
            for (const [key, value] of Object.entries(this.modal.userArgs)) {
                if (Array.isArray(value)) {
                    const filtered = value.filter(v => v.trim() !== '');
                    if (filtered.length > 0) {
                        cleanedUserArgs[key] = filtered;
                    }
                } else if (value && value.trim() !== '') {
                    cleanedUserArgs[key] = value;
                }
            }

            const cleanedUrlParams = {};
            for (const p of this.modal.urlParams) {
                const v = (this.modal.urlParamValues[p.name] || '').trim();
                if (v) cleanedUrlParams[p.name] = v;
            }

            const result = {
                envValues: this.modal.envValues,
                headerValues: this.modal.headerValues,
                oauthValues: this.modal.oauthValues,
                userArgs: cleanedUserArgs,
                urlParams: cleanedUrlParams,
                oauthMode: this.modal.oauthMode,
            };
            if (this.modal.oauthMode === 'byo') {
                result.byo = {
                    clientId: this.modal.byo.clientId.trim(),
                    clientSecret: this.modal.byo.clientSecret.trim(),
                    selectedScopes: [...this.modal.selectedScopes],
                };
            } else if (this.modal.oauthMode === 'dcr') {
                result.dcr = {
                    issuer: this.modal.dcr.discoveryResult?.issuer,
                    selectedScopes: [...this.modal.selectedScopes],
                    registrationToken: this.modal.dcr.registrationToken.trim() || null,
                };
            }

            this.modal.visible = false;
            if (_modalResolve) _modalResolve(result);
            _modalResolve = null;
        },

        modalCancel() {
            this.modal.visible = false;
            if (_modalResolve) _modalResolve(null);
            _modalResolve = null;
        },

        addArgValue(argName) {
            if (!this.modal.userArgs[argName]) {
                this.modal.userArgs[argName] = [];
            }
            this.modal.userArgs[argName].push('');
        },

        removeArgValue(argName, idx) {
            if (this.modal.userArgs[argName] && this.modal.userArgs[argName].length > 1) {
                this.modal.userArgs[argName].splice(idx, 1);
            }
        },

        async init() {
            // Check for OAuth callback results in URL
            const urlParams = new URLSearchParams(window.location.search);
            const success = urlParams.get('success');
            const error = urlParams.get('error');
            const message = urlParams.get('message');
            const installed = urlParams.get('installed');

            try {
                const cfg = await window.OpenMaskitConfig.get();
                this.updateRequired = !!(cfg.version_status && cfg.version_status.update_required);
            } catch {
                this.updateRequired = false;
            }

            try {
                await this.loadCatalog();
            } catch (e) {
                this.showToast('Failed to load marketplace', 'error');
            }
            this.loading = false;

            // Show OAuth result after catalog loads
            if (success && installed) {
                window.history.replaceState({}, '', '/marketplace');
                this.showToast(`${installed} installed successfully!`, 'success');
            } else if (error) {
                window.history.replaceState({}, '', '/marketplace');
                this.showToast(`Error: ${message || error}`, 'error');
            }
        },

        async loadCatalog(page = 1) {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: page.toString(),
                    size: this.pageSize.toString(),
                });
                if (this.search.trim()) {
                    params.set('q', this.search.trim());
                }

                const res = await fetch(`/api/marketplace?${params}`);
                if (!res.ok) throw new Error('Failed to load marketplace');

                const data = await res.json();
                this.servers = data.servers.map(s => ({ ...s, installing: false, deactivating: false }));

                // Update pagination metadata
                if (data.meta) {
                    this.currentPage = data.meta.page;
                    this.totalPages = data.meta.total_pages;
                    this.totalServers = data.meta.total;
                }
            } finally {
                this.loading = false;
            }
        },

        onSearchInput() {
            // Debounce search: wait 400ms after user stops typing
            clearTimeout(_searchDebounceTimer);
            _searchDebounceTimer = setTimeout(() => {
                this.currentPage = 1; // Reset to page 1 on new search
                this.loadCatalog(1);
            }, 400);
        },

        async goToPage(page) {
            if (page < 1 || page > this.totalPages || page === this.currentPage) return;
            await this.loadCatalog(page);
            // Scroll to top of marketplace section
            document.querySelector('.panel').scrollIntoView({ behavior: 'smooth' });
        },

        async nextPage() {
            if (this.currentPage < this.totalPages) {
                await this.goToPage(this.currentPage + 1);
            }
        },

        async prevPage() {
            if (this.currentPage > 1) {
                await this.goToPage(this.currentPage - 1);
            }
        },

        async installServer(server) {
            let envVars = {};
            let headers = {};
            let userArgs = {};
            let urlParams = {};
            let byoPayload = null;
            let dcrPayload = null;

            const needsEnv = server.env_vars && server.env_vars.length > 0;
            const needsHeaders = server.header_vars && server.header_vars.length > 0;
            const hasConfigurableArgs = server.meta?.configurable_args && server.meta.configurable_args.length > 0;
            const needsUrlParams = server.meta?.params && server.meta.params.length > 0;
            const oauthMode = server.oauth_mode;  // 'byo' | 'dcr' | null
            const isHostedBroker = !oauthMode && server.requires_oauth;

            if (oauthMode === 'byo') {
                const result = await this.openByoModal(server);
                if (!result) return;
                byoPayload = result.byo;
                urlParams = result.urlParams || {};
            } else if (oauthMode === 'dcr') {
                const result = await this.openDcrModal(server);
                if (!result) return;
                dcrPayload = result.dcr;
                urlParams = result.urlParams || {};
            } else if (isHostedBroker) {
                // Hosted-broker: only collect env vars (OAuth handled by backend).
                // URL templating against hosted-broker entries isn't supported
                // yet — would need backend coordination since the broker
                // controls the upstream URL.
                if (needsEnv) {
                    const result = await this.openModal(server, server.env_vars, [], []);
                    if (!result) return;
                    envVars = result.envValues;
                }
            } else if (needsEnv || needsHeaders || hasConfigurableArgs || needsUrlParams) {
                // Non-OAuth with env vars, static headers, args, or URL params to fill in.
                const result = await this.openModal(
                    server,
                    needsEnv ? server.env_vars : [],
                    [],
                    needsHeaders ? server.header_vars : [],
                );
                if (!result) return;
                envVars = result.envValues;
                headers = result.headerValues || {};
                userArgs = result.userArgs || {};
                urlParams = result.urlParams || {};
            }

            server.installing = true;
            try {
                const payload = {
                    server_id: server.id,
                    backend_id: server.backend_id,
                    env_vars: envVars,
                    user_args: userArgs,
                };
                if (Object.keys(headers).length > 0) {
                    payload.headers = headers;
                }
                if (Object.keys(urlParams).length > 0) {
                    payload.params = urlParams;
                }
                if (byoPayload) {
                    payload.client_id = byoPayload.clientId;
                    payload.client_secret = byoPayload.clientSecret;
                    payload.selected_scopes = byoPayload.selectedScopes;
                } else if (dcrPayload) {
                    if (dcrPayload.issuer) payload.issuer = dcrPayload.issuer;
                    payload.selected_scopes = dcrPayload.selectedScopes;
                    if (dcrPayload.registrationToken) payload.registration_token = dcrPayload.registrationToken;
                }

                const res = await fetch('/api/marketplace/install', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });
                const data = await res.json();
                if (!res.ok) {
                    this.showToast(data.error || 'Install failed', 'error');
                    server.installing = false;
                } else if (data.requires_oauth && data.oauth_url) {
                    // Hosted-broker OAuth - redirect in same tab
                    this.showToast('Redirecting to authorization...', 'info');
                    window.location.href = data.oauth_url;
                } else {
                    // BYO / DCR / non-OAuth: install completed (browser flow already finished)
                    server.installed = true;
                    server.active = true;
                    server.connected = data.connected;
                    server.installing = false;
                    if (data.connected) {
                        this.showToast(`${server.name} installed and connected`);
                    } else {
                        this.showToast(`${server.name} installed but failed to connect: ${data.error || 'unknown error'}`, 'error');
                    }
                }
            } catch (e) {
                this.showToast('Network error: ' + e.message, 'error');
                server.installing = false;
            }
        },

        async deactivateServer(server) {
            if (!confirm(`Deactivate ${server.name}? This will disconnect the server.`)) return;
            server.deactivating = true;
            try {
                const res = await fetch('/api/marketplace/deactivate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ server_id: server.id }),
                });
                if (res.ok) {
                    server.active = false;
                    server.connected = false;
                    server.deactivating = false;
                    this.showToast(`${server.name} deactivated`);
                } else {
                    const data = await res.json();
                    this.showToast(data.error || 'Deactivation failed', 'error');
                    server.deactivating = false;
                }
            } catch (e) {
                this.showToast('Network error: ' + e.message, 'error');
                server.deactivating = false;
            }
        },

        async activateServer(server) {
            server.installing = true;
            try {
                const res = await fetch('/api/marketplace/activate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ server_id: server.id }),
                });
                const data = await res.json();
                if (res.ok) {
                    server.active = true;
                    server.connected = data.connected;
                    this.showToast(`${server.name} activated`);
                } else {
                    this.showToast(data.error || 'Activation failed', 'error');
                }
            } catch (e) {
                this.showToast('Network error: ' + e.message, 'error');
            }
            server.installing = false;
        },
    };
}
</script>
</body>
</html>
