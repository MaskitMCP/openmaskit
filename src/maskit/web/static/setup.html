<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maskit - Setup</title>
    <link rel="stylesheet" href="/static/style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
<div x-data="setup()" x-init="init()">
    <header>
        <h1>Maskit</h1>
        <nav>
            <a href="/">Dashboard</a>
            <a href="/setup" class="active">Setup</a>
        </nav>
    </header>

    <main>
        <section class="panel">
            <h2>Add Masking Rule</h2>
            <form @submit.prevent="addRule()">
                <div class="form-row">
                    <label>
                        Tool Name
                        <input type="text" x-model="newRule.tool_name" placeholder="* (all tools)">
                    </label>
                    <label>
                        Field Path
                        <input type="text" x-model="newRule.field_path" placeholder="e.g. connection.host" required>
                    </label>
                    <label>
                        Alias Prefix (optional)
                        <input type="text" x-model="newRule.alias_prefix" placeholder="auto from field name">
                    </label>
                    <button type="submit" class="btn-primary">Add Rule</button>
                </div>
            </form>
        </section>

        <section class="panel">
            <h2>Available Tools</h2>
            <p x-show="tools.length === 0" class="muted">
                No tools discovered yet. Tools will appear here once the upstream server responds to a tools/list request.
            </p>
            <template x-for="tool in tools" :key="tool.name">
                <div class="tool-card">
                    <div class="tool-header">
                        <h3 x-text="tool.name"></h3>
                        <button class="btn-small btn-try" @click="toggleTry(tool)" x-show="tool.inputSchema && Object.keys(tool.inputSchema.properties || {}).length > 0">
                            <span x-text="tool._tryOpen ? 'Close' : 'Try it out'"></span>
                        </button>
                    </div>
                    <p class="tool-desc" x-text="tool.description || ''"></p>

                    <div x-show="tool.inputSchema" class="schema-section">
                        <h4>Input Schema</h4>
                        <div class="schema-fields">
                            <template x-for="(prop, name) in (tool.inputSchema?.properties || {})" :key="name">
                                <div class="field-row" @click="quickAddRule(tool.name, name)">
                                    <code x-text="name"></code>
                                    <span class="field-type" x-text="prop.type || 'any'"></span>
                                    <span class="field-desc" x-text="prop.description || ''"></span>
                                    <button class="btn-small">Mask</button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div x-show="tool._tryOpen" class="try-section">
                        <h4>Try it out</h4>
                        <div class="try-form">
                            <template x-for="(prop, name) in (tool.inputSchema?.properties || {})" :key="name">
                                <label class="try-field">
                                    <span>
                                        <code x-text="name"></code>
                                        <span x-show="(tool.inputSchema?.required || []).includes(name)" class="required">*</span>
                                        <span class="field-type" x-text="prop.type || 'any'"></span>
                                    </span>
                                    <input
                                        x-show="prop.type !== 'object' && prop.type !== 'array'"
                                        :type="prop.type === 'number' || prop.type === 'integer' ? 'number' : 'text'"
                                        :placeholder="prop.description || ''"
                                        @input="setTryArg(tool, name, $event.target.value, prop.type)"
                                    >
                                    <textarea
                                        x-show="prop.type === 'object' || prop.type === 'array'"
                                        :placeholder="prop.description || 'JSON'"
                                        rows="3"
                                        @input="setTryArg(tool, name, $event.target.value, prop.type)"
                                    ></textarea>
                                </label>
                            </template>
                            <div class="try-actions">
                                <button class="btn-primary" @click="callTool(tool)" :disabled="tool._tryLoading">
                                    <span x-show="!tool._tryLoading">Call</span>
                                    <span x-show="tool._tryLoading">Calling...</span>
                                </button>
                            </div>
                        </div>
                        <div x-show="tool._tryError" class="try-error">
                            <pre x-text="tool._tryError"></pre>
                        </div>
                        <div x-show="tool._tryResult" class="try-result">
                            <h4>Response</h4>
                            <pre x-text="tool._tryResult"></pre>
                        </div>
                    </div>
                </div>
            </template>
        </section>
    </main>
</div>

<script>
function setup() {
    return {
        tools: [],
        newRule: { tool_name: '*', field_path: '', alias_prefix: '' },

        async init() {
            await this.loadTools();
        },

        async loadTools() {
            const res = await fetch('/api/tools');
            const data = await res.json();
            this.tools = data.tools.map(t => ({
                ...t,
                _tryOpen: false,
                _tryArgs: {},
                _tryLoading: false,
                _tryResult: null,
                _tryError: null,
            }));
        },

        toggleTry(tool) {
            tool._tryOpen = !tool._tryOpen;
        },

        setTryArg(tool, fieldName, value, type) {
            if (value === '') {
                delete tool._tryArgs[fieldName];
            } else if (type === 'number' || type === 'integer') {
                tool._tryArgs[fieldName] = Number(value);
            } else if (type === 'boolean') {
                tool._tryArgs[fieldName] = value === 'true';
            } else if (type === 'object' || type === 'array') {
                try { tool._tryArgs[fieldName] = JSON.parse(value); }
                catch { tool._tryArgs[fieldName] = value; }
            } else {
                tool._tryArgs[fieldName] = value;
            }
        },

        async callTool(tool) {
            tool._tryLoading = true;
            tool._tryResult = null;
            tool._tryError = null;
            try {
                const res = await fetch('/api/tools/call', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tool_name: tool.name, arguments: tool._tryArgs }),
                });
                const data = await res.json();
                if (data.error) {
                    tool._tryError = typeof data.error === 'string' ? data.error : JSON.stringify(data.error, null, 2);
                } else {
                    tool._tryResult = JSON.stringify(data.result, null, 2);
                }
            } catch (e) {
                tool._tryError = e.message;
            } finally {
                tool._tryLoading = false;
            }
        },

        async addRule() {
            if (!this.newRule.field_path) return;
            await fetch('/api/rules/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(this.newRule),
            });
            this.newRule = { tool_name: '*', field_path: '', alias_prefix: '' };
        },

        async quickAddRule(toolName, fieldName) {
            await fetch('/api/rules/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tool_name: toolName,
                    field_path: fieldName,
                    alias_prefix: '',
                }),
            });
        }
    };
}
</script>
</body>
</html>
